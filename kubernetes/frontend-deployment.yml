apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskmanager-ui
  namespace: task-manager
  labels:
    app: taskmanager-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: taskmanager-ui
  template:
    metadata:
      labels:
        app: taskmanager-ui
    spec:
      containers:
        - name: taskmanager-ui
          image: your-dockerhub-user/taskmanager-ui:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: taskmanager-ui-service
  namespace: task-manager
spec:
  selector:
    app: taskmanager-ui
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
