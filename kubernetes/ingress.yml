apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskmanager-ingress
  namespace: task-manager
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/websocket-services: "taskmanager-api-service"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - taskmanager.example.com
      secretName: taskmanager-tls
  rules:
    - host: taskmanager.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: taskmanager-api-service
                port:
                  number: 3001
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: taskmanager-api-service
                port:
                  number: 3001
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: taskmanager-api-service
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: taskmanager-ui-service
                port:
                  number: 80
