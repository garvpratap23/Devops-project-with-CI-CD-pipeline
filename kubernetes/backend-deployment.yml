apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskmanager-api
  namespace: task-manager
  labels:
    app: taskmanager-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: taskmanager-api
  template:
    metadata:
      labels:
        app: taskmanager-api
    spec:
      containers:
        - name: taskmanager-api
          image: your-dockerhub-user/taskmanager-api:latest
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: taskmanager-config
            - secretRef:
                name: taskmanager-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: taskmanager-api-service
  namespace: task-manager
spec:
  selector:
    app: taskmanager-api
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP
